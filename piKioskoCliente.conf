# ──────────────────────────────────────────────────────────────────────────────
# piKioskoCliente.conf
# Coloca este archivo en el mismo directorio que el ejecutable.
# Editable también desde el panel de ajustes ajustes de la aplicación.
# ──────────────────────────────────────────────────────────────────────────────

# URL del endpoint del API incluyendo el path completo, sin query params.
# En cada sincronizacion la aplicacion genera la URL completa agregando:
#   ?type={MEDIA_TYPE}&date={AAAA-MM-DD}&screen={SCREEN_ID}&token={TOKEN}
# Ejemplo local:      http://localhost:3000/media/resources
# Ejemplo: https://mi-servidor.com/media/resources
API_BASE_URL = http://localhost:3000/media/resources

# Identificador de esta pantalla (parámetro screen= en la URL del API).
SCREEN_ID = 1

# Token de autenticación (parámetro token= en la URL del API).
TOKEN = test

# Tipo de contenido a solicitar al servidor.
# Valores permitidos: video | image | mixed
MEDIA_TYPE = video

# Color de fondo que se muestra detrás del video y en la pantalla de carga.
# Acepta cualquier valor CSS válido: #RRGGBB, rgb(), nombre de color, etc.
BACKGROUND_COLOR = #000000

# Imagen de fondo opcional.
# Puede ser ruta absoluta, relativa al .conf, o URL http/https.
# Dejar en blanco para no usar imagen de fondo.
BACKGROUND_IMAGE =

# Muestra el nombre del video en la esquina superior izquierda durante 5 segundos.
# Valores permitidos: true | false
SHOW_NAME = true

# Muestra la descripcion del video junto al nombre (requiere SHOW_NAME = true).
# Valores permitidos: true | false
SHOW_DESCRIPTION = true

# Muestra la barra de progreso en el borde inferior durante la reproduccion.
# Valores permitidos: true | false
SHOW_PROGRESS = true

# Segundos de espera al arrancar antes de intentar la primera sincronizacion.
# Permite que el dispositivo (Raspberry Pi) se conecte a la red antes de
# consultar el servidor. Valor minimo: 0. Por defecto: 5.
STARTUP_DELAY = 5
