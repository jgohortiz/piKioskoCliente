# ──────────────────────────────────────────────────────────────────────────────
# piKioskoCliente.conf
# Archivo de configuración del reproductor de kiosco.
# Coloca este archivo en el mismo directorio que el ejecutable (o en la raíz
# del proyecto al ejecutar con "npm start").
#
# Las líneas que comienzan con # son comentarios y se ignoran.
# Formato:  CLAVE = valor
# ──────────────────────────────────────────────────────────────────────────────

# URL del JSON que contiene la lista de videos a reproducir.
# El JSON debe ser un array de objetos: [{ "id", "filename", "url" }, ...]
# o un array de URLs directas: ["https://...", "https://..."]
PLAYLIST_URL = http://localhost:3000/playlist.json

# Color de fondo que se muestra detrás del video y en la pantalla de carga.
# Acepta cualquier valor CSS válido: #RRGGBB, rgb(), nombre de color, etc.
BACKGROUND_COLOR = #000000

# Imagen de fondo opcional (se muestra detrás del video con object-fit: cover).
# Puede ser una ruta absoluta, una ruta relativa al ejecutable, o una URL http/https.
# Deja en blanco o comenta esta línea para no usar imagen de fondo.
# Ejemplos:
#   BACKGROUND_IMAGE = /home/pi/fondo.jpg
#   BACKGROUND_IMAGE = C:\Users\Usuario\fondo.png
#   BACKGROUND_IMAGE = https://mi-servidor.com/fondo.jpg
BACKGROUND_IMAGE =
