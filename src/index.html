<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>piKioskoCliente</title>
  <style>
    /* ── RESET ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /*
     * Paleta de colores extraída del logo Raspberry Pi
     *  --raspberry:     #C51A4A  frambuesa principal
     *  --raspberry-dk:  #8B1A3A  frambuesa oscura / sombras
     *  --raspberry-xdk: #5C0F26  frambuesa muy oscura (fondo oscuro)
     *  --leaf:          #6AB023  hoja verde brillante
     *  --leaf-dk:       #4A7A1A  hoja verde oscura
     */
    :root {
      --raspberry:     #C51A4A;
      --raspberry-dk:  #8B1A3A;
      --raspberry-xdk: #000000;
      --leaf:          #6AB023;
      --leaf-dk:       #4A7A1A;

      --bg:      #000000;
      --accent:  #C51A4A;
      --accent2: #6AB023;
      --glass:   rgba(26, 5, 16, 0.80);
      --radius:  12px;
      --font:    'Segoe UI', 'DejaVu Sans', 'Liberation Sans', Arial, sans-serif;
    }

    html, body {
      width: 100vw; height: 100vh;
      overflow: hidden;
      background: var(--bg);
      font-family: var(--font);
      color: #fff;
      user-select: none;
    }

    /* ── FONDO ──────────────────────────────────────────────────── */
    #bg-image {
      position: fixed; inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0;
      transition: opacity 0.6s;
      z-index: 0;
    }
    #bg-image.active { opacity: 1; }

    /* ── VIDEO ──────────────────────────────────────────────────── */
    #video-container {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 1; background: transparent;
    }
    #player { width: 100%; height: 100%; object-fit: contain; display: block; }

    /* ── BARRA INFERIOR ─────────────────────────────────────────── */
    #bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 20;
      background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 100%);
      pointer-events: none;   /* la barra en sí no captura eventos */
    }

    /* ── INFO INFERIOR IZQUIERDA: nombre + contador ─────────────── */
    #video-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      pointer-events: none;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.35s, transform 0.35s;
      max-width: 60vw;
    }
    #video-info.visible { opacity: 1; transform: translateY(0); }

    #video-name {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: rgba(255,255,255,0.92);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 1px 6px rgba(0,0,0,0.8);
    }
    #video-counter {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--leaf);
      text-shadow: 0 1px 6px rgba(0,0,0,0.8);
    }

    /* ── BOTÓN DE AJUSTES INFERIOR DERECHA ──────────────────────── */
    #settings-btn {
      pointer-events: all;   /* este sí captura clics */
      width: 40px; height: 40px;
      border-radius: 50%;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.55);
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(10px);
      transition: background 0.2s, color 0.2s, border-color 0.2s, opacity 0.3s;
      opacity: 0.35;
      flex-shrink: 0;
    }
    #settings-btn:hover {
      background: rgba(197,26,74,0.18);
      border-color: rgba(197,26,74,0.55);
      color: var(--raspberry);
      opacity: 1;
    }

    /* Barra de progreso del video */
    #progress-track {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: rgba(255,255,255,0.07);
      z-index: 21;
    }
    #progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--raspberry), var(--leaf));
      transition: width 0.5s linear;
    }

    /* ── MODAL DE AJUSTES ───────────────────────────────────────── */
    #settings-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.78);
      backdrop-filter: blur(18px);
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    #settings-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    #settings-panel {
      width: min(480px, 90vw);
      background: #0d0d0d;
      border: 1px solid rgba(197,26,74,0.28);
      border-radius: 18px;
      padding: 32px 30px 28px;
      transform: translateY(16px) scale(0.98);
      transition: transform 0.3s;
      box-shadow: 0 24px 80px rgba(0,0,0,0.7);
    }
    #settings-overlay.open #settings-panel {
      transform: translateY(0) scale(1);
    }

    /* Cabecera del panel */
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .panel-title {
      font-size: 13px;
      letter-spacing: 5px;
      color: var(--raspberry);
      text-transform: uppercase;
    }
    #close-settings {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.5);
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    #close-settings:hover { background: rgba(197,26,74,0.20); color: var(--raspberry); }

    /* Campos del formulario */
    .field { margin-bottom: 22px; }
    .field-label {
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      margin-bottom: 8px;
      display: block;
    }
    .field-input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 11px 14px;
      font-family: var(--font);
      font-size: 12px;
      color: #fff;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .field-input:focus {
      border-color: rgba(197,26,74,0.55);
      background: rgba(197,26,74,0.06);
    }
    .field-input::placeholder { color: rgba(255,255,255,0.2); }

    /* Fila de color: input texto + color picker */
    .color-row {
      display: flex; gap: 10px; align-items: center;
    }
    .color-row .field-input { flex: 1; }
    #color-picker {
      width: 44px; height: 42px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      background: transparent;
      cursor: pointer;
      padding: 2px;
      flex-shrink: 0;
    }
    #color-picker::-webkit-color-swatch-wrapper { padding: 0; border-radius: 6px; }
    #color-picker::-webkit-color-swatch { border: none; border-radius: 6px; }

    /* Nota de ayuda */
    .field-hint {
      font-size: 9px;
      color: rgba(255,255,255,0.2);
      margin-top: 5px;
      line-height: 1.5;
    }

    /* Ruta del archivo .conf */
    #conf-path-display {
      font-size: 9px;
      color: rgba(106,176,35,0.45);
      margin-bottom: 24px;
      letter-spacing: 0.3px;
      line-height: 1.5;
      word-break: break-all;
    }

    /* Botones de acción */
    .btn-row {
      display: flex; gap: 10px; margin-top: 6px;
    }
    .btn {
      flex: 1;
      padding: 12px 10px;
      border-radius: 9px;
      font-family: var(--font);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      border: 1px solid transparent;
    }
    .btn-primary {
      background: rgba(197,26,74,0.15);
      border-color: rgba(197,26,74,0.45);
      color: var(--raspberry);
    }
    .btn-primary:hover { background: rgba(197,26,74,0.28); }
    .btn-secondary {
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.45);
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.09); }

    /* Mensaje de guardado */
    #save-msg {
      text-align: center;
      font-size: 10px;
      letter-spacing: 1px;
      margin-top: 14px;
      min-height: 14px;
      transition: opacity 0.3s;
    }
    #save-msg.ok  { color: #4cff91; }
    #save-msg.err { color: var(--raspberry); }

    /* ── SPLASH DE CARGA ────────────────────────────────────────── */
    #splash {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100;
      transition: opacity 0.8s ease;
      background: #000000;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }

    .logo-wrap { width: 88px; height: 88px; margin-bottom: 26px; }
    .logo-wrap img { width: 100%; height: 100%; object-fit: contain; animation: logoPulse 3s ease-in-out infinite; filter: drop-shadow(0 0 18px rgba(197,26,74,0.5)); }
    @keyframes logoPulse { 0%,100%{transform:scale(1);filter:drop-shadow(0 0 16px rgba(197,26,74,0.45));} 50%{transform:scale(1.06);filter:drop-shadow(0 0 28px rgba(197,26,74,0.75));} }
    .logo-ring {
      animation: spin 3s linear infinite;
      transform-origin: 40px 40px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #app-name    { font-size: 12px; letter-spacing: 7px; color: var(--raspberry); text-transform: uppercase; margin-bottom: 8px; }
    #app-version { font-size: 9px; letter-spacing: 3px; color: rgba(255,255,255,0.18); margin-bottom: 40px; }

    #status-card {
      width: 360px;
      background: rgba(197,26,74,0.04);
      border: 1px solid rgba(197,26,74,0.22);
      border-radius: var(--radius);
      padding: 22px 26px;
    }
    #status-line { font-size: 11px; letter-spacing: 1px; color: rgba(255,255,255,0.5); min-height: 16px; margin-bottom: 18px; }

    #dl-wrap { display: none; }
    #dl-wrap.visible { display: block; }
    #dl-name { font-size: 10px; color: rgba(255,255,255,0.3); margin-bottom: 7px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #dl-track { height: 2px; background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden; }
    #dl-fill  { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); width: 0%; transition: width 0.2s; }
    #dl-pct   { font-size: 10px; color: var(--accent); text-align: right; margin-top: 4px; }

    #conf-info { margin-top: 16px; font-size: 9px; color: rgba(255,255,255,0.16); letter-spacing: 0.4px; line-height: 1.7; word-break: break-all; }

    #error-box {
      display: none; margin-top: 16px;
      padding: 11px 14px;
      background: rgba(255,61,113,0.07);
      border: 1px solid rgba(255,61,113,0.2);
      border-radius: 8px;
      font-size: 10px; color: var(--raspberry); line-height: 1.6;
    }
    #error-box.visible { display: block; }
    #retry-btn {
      display: none; margin-top: 13px; width: 100%; padding: 11px;
      background: rgba(197,26,74,0.10); border: 1px solid rgba(197,26,74,0.35);
      border-radius: 8px; color: var(--raspberry);
      font-family: var(--font); font-size: 11px; letter-spacing: 2px;
      text-transform: uppercase; cursor: pointer; pointer-events: all;
      transition: background 0.2s;
    }
    #retry-btn:hover { background: rgba(197,26,74,0.22); }
    #retry-btn.visible { display: block; }

    .dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots { 0%{content:'';} 25%{content:'.';} 50%{content:'..';} 75%{content:'...';} }

    /* ── BADGE OFFLINE ──────────────────────────────────────────── */
    #offline-badge {
      position: fixed;
      top: 18px; right: 20px;
      display: flex;
      align-items: center;
      gap: 7px;
      background: rgba(0, 0, 0, 0.82);
      border: 1px solid rgba(197, 26, 74, 0.55);
      border-radius: 100px;
      padding: 6px 14px 6px 10px;
      font-family: var(--font);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #fff;
      z-index: 50;
      backdrop-filter: blur(10px);
      /* hidden by default */
      opacity: 0;
      transform: translateY(-6px);
      pointer-events: none;
      transition: opacity 0.4s, transform 0.4s;
    }
    #offline-badge.visible {
      opacity: 1;
      transform: translateY(0);
    }
    /* Pulsing red dot */
    .offline-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #C51A4A;
      flex-shrink: 0;
      animation: offlinePulse 1.4s ease-in-out infinite;
    }
    @keyframes offlinePulse {
      0%, 100% { opacity: 1;   transform: scale(1);    box-shadow: 0 0 0 0 rgba(197,26,74,0.6); }
      50%       { opacity: 0.7; transform: scale(1.15); box-shadow: 0 0 0 5px rgba(197,26,74,0);  }
    }

  </style>
</head>
<body>

  <!-- Imagen de fondo -->
  <div id="bg-image"></div>

  <!-- Badge de estado de red -->
  <div id="offline-badge"><span class="offline-dot"></span>Offline</div>

  <!-- Reproductor -->
  <div id="video-container">
    <video id="player" preload="auto" playsinline></video>
  </div>

  <!-- Barra inferior -->
  <div id="bottom-bar">

    <!-- Esquina inferior izquierda: nombre y contador -->
    <div id="video-info">
      <div id="video-name">—</div>
      <div id="video-counter">0 / 0</div>
    </div>

    <!-- Esquina inferior derecha: botón de ajustes -->
    <button id="settings-btn" title="Ajustes" onclick="openSettings()">⚙</button>

  </div>

  <!-- Barra de progreso del video -->
  <div id="progress-track">
    <div id="progress-fill"></div>
  </div>

  <!-- ── MODAL DE AJUSTES ──────────────────────────────────────── -->
  <div id="settings-overlay">
    <div id="settings-panel">

      <div class="panel-header">
        <span class="panel-title">Ajustes</span>
        <button id="close-settings" onclick="closeSettings()">✕</button>
      </div>

      <div id="conf-path-display"></div>

      <div class="field">
        <label class="field-label" for="f-url">URL de la playlist JSON</label>
        <input id="f-url" class="field-input" type="url"
               placeholder="http://servidor.com/playlist.json" spellcheck="false" />
        <div class="field-hint">Endpoint que devuelve el listado de videos en formato JSON.</div>
      </div>

      <div class="field">
        <label class="field-label" for="f-color">Color de fondo</label>
        <div class="color-row">
          <input id="f-color" class="field-input" type="text"
                 placeholder="#000000" spellcheck="false" />
          <input id="color-picker" type="color" value="#000000"
                 oninput="document.getElementById('f-color').value = this.value" />
        </div>
        <div class="field-hint">Cualquier valor CSS válido: #RRGGBB, rgb(), nombre de color…</div>
      </div>

      <div class="field">
        <label class="field-label" for="f-image">Imagen de fondo</label>
        <input id="f-image" class="field-input" type="text"
               placeholder="/ruta/al/fondo.jpg  o  https://…" spellcheck="false" />
        <div class="field-hint">Ruta absoluta, relativa al archivo .conf, o URL http/https. Dejar vacío para no usar imagen.</div>
      </div>

      <div class="btn-row">
        <button class="btn btn-secondary" onclick="closeSettings()">Cancelar</button>
        <button class="btn btn-primary"   onclick="saveSettings()">✓ &nbsp;Guardar</button>
      </div>

      <div id="save-msg"></div>

    </div>
  </div>

    <div id="app-name">piKioskoCliente</div>
    <div id="app-version">v1.0.0</div>

    <div id="status-card">
      <div id="status-line"><span class="dots">Cargando configuración</span></div>

      <div id="dl-wrap">
        <div id="dl-name">—</div>
        <div id="dl-track"><div id="dl-fill"></div></div>
        <div id="dl-pct">0%</div>
      </div>

      <div id="conf-info"></div>
      <div id="error-box"></div>
      <button id="retry-btn" onclick="startSync()">↺ &nbsp;Reintentar</button>
    </div>
  </div>

  <script>
  // ════════════════════════════════════════════════════════════════
  //  piKioskoCliente — Renderer
  // ════════════════════════════════════════════════════════════════

  // ── ESTADO ──────────────────────────────────────────────────────
  const state = { playlist: [], currentIdx: 0, syncing: false, config: null };

  // ── DOM ─────────────────────────────────────────────────────────
  const $player       = document.getElementById('player');
  const $splash       = document.getElementById('splash');
  const $bgImage      = document.getElementById('bg-image');
  const $statusLine   = document.getElementById('status-line');
  const $dlWrap       = document.getElementById('dl-wrap');
  const $dlName       = document.getElementById('dl-name');
  const $dlFill       = document.getElementById('dl-fill');
  const $dlPct        = document.getElementById('dl-pct');
  const $confInfo     = document.getElementById('conf-info');
  const $errorBox     = document.getElementById('error-box');
  const $retryBtn     = document.getElementById('retry-btn');
  const $progressFill = document.getElementById('progress-fill');
  const $videoInfo    = document.getElementById('video-info');
  const $offlineBadge = document.getElementById('offline-badge');
  const $videoName    = document.getElementById('video-name');
  const $videoCounter = document.getElementById('video-counter');
  const $settingsOvl  = document.getElementById('settings-overlay');
  const $confPathDisp = document.getElementById('conf-path-display');

  // Campos del formulario de ajustes
  const $fUrl    = document.getElementById('f-url');
  const $fColor  = document.getElementById('f-color');
  const $fImage  = document.getElementById('f-image');
  const $cpicker = document.getElementById('color-picker');
  const $saveMsg = document.getElementById('save-msg');

  // ── UTILIDADES ──────────────────────────────────────────────────
  const setStatus = (html) => ($statusLine.innerHTML = html);

  function showError(msg) {
    $errorBox.textContent = msg;
    $errorBox.classList.add('visible');
    $retryBtn.classList.add('visible');
  }
  function clearError() {
    $errorBox.classList.remove('visible');
    $retryBtn.classList.remove('visible');
    $errorBox.textContent = '';
  }

  function setOffline(isOffline) {
    if (isOffline) {
      $offlineBadge.classList.add('visible');
    } else {
      $offlineBadge.classList.remove('visible');
    }
  }
  function showDlProgress(filename, pct) {
    $dlWrap.classList.add('visible');
    $dlName.textContent = filename;
    $dlFill.style.width  = pct + '%';
    $dlPct.textContent   = pct + '%';
  }
  function hideDlProgress() {
    $dlWrap.classList.remove('visible');
    $dlFill.style.width = '0%';
  }

  // ── APLICAR CONFIGURACIÓN (fondo, colores) ───────────────────────
  function applyConfig(cfg) {
    state.config = cfg;
    document.documentElement.style.setProperty('--bg', cfg.backgroundColor);
    document.body.style.background = cfg.backgroundColor;
    $splash.style.background       = cfg.backgroundColor;

    if (cfg.backgroundImage) {
      $bgImage.style.backgroundImage = `url("${cfg.backgroundImage}")`;
      $bgImage.classList.add('active');
    } else {
      $bgImage.classList.remove('active');
      $bgImage.style.backgroundImage = '';
    }

    $confInfo.innerHTML =
      `URL: ${cfg.playlistUrl}<br>` +
      `Fondo: ${cfg.backgroundColor}` +
      (cfg.backgroundImage ? `<br>Imagen: ${cfg.rawBackgroundImage || cfg.backgroundImage}` : '');
  }

  // ── BARRA INFERIOR: nombre y contador ───────────────────────────
  let _infoTimer;
  function updateVideoInfo(show = true) {
    if (!state.playlist.length) return;
    const v = state.playlist[state.currentIdx];
    $videoName.textContent    = v.filename.replace(/\.[^.]+$/, '');
    $videoCounter.textContent = `${state.currentIdx + 1} / ${state.playlist.length}`;

    if (show) {
      $videoInfo.classList.add('visible');
      clearTimeout(_infoTimer);
      // Se mantiene visible mientras el video corre; desaparece a los 5 s
      _infoTimer = setTimeout(() => $videoInfo.classList.remove('visible'), 5000);
    }
  }

  // Mostrar info al mover el ratón
  document.addEventListener('mousemove', () => {
    if (state.playlist.length) updateVideoInfo(true);
  });

  // ── PROGRESO DEL VIDEO ───────────────────────────────────────────
  $player.addEventListener('timeupdate', () => {
    if ($player.duration) {
      $progressFill.style.width = ($player.currentTime / $player.duration * 100) + '%';
    }
  });

  // ── REPRODUCCIÓN ─────────────────────────────────────────────────
  function playAt(idx) {
    if (!state.playlist.length) return;
    state.currentIdx = idx;
    const v = state.playlist[idx];
    $player.src = v.localPath;
    $player.load();
    $player.play().catch(() => setTimeout(onVideoEnded, 1500));
    $progressFill.style.width = '0%';
    updateVideoInfo(true);
  }

  function onVideoEnded() {
    const next = state.currentIdx + 1;
    if (next < state.playlist.length) {
      playAt(next);
    } else {
      console.log('[PLAYER] Lista completa — re-sincronizando…');
      startSync(() => playAt(0));
    }
  }

  $player.addEventListener('ended', onVideoEnded);
  $player.addEventListener('error', () => setTimeout(onVideoEnded, 2000));

  // ── SINCRONIZACIÓN ────────────────────────────────────────────────
  async function startSync(onDone) {
    if (state.syncing) return;
    state.syncing = true;

    const isPlaying = state.playlist.length > 0 && !$player.paused;
    if (!isPlaying) {
      $splash.classList.remove('hidden');
      $splash.style.opacity = '1';
    }

    clearError();
    hideDlProgress();
    setStatus('<span class="dots">Conectando con el servidor</span>');

    try {
      const result = await window.piKiosko.fetchAndSync();
      if (!result.ok) throw new Error(result.error || 'Error desconocido');
      if (!result.videos?.length) throw new Error('La lista de reproducción está vacía');

      state.playlist = result.videos;
      setStatus(`✓ ${result.videos.length} video(s) listos`);
      hideDlProgress();
      setOffline(false);

      setTimeout(() => {
        $splash.style.opacity = '0';
        setTimeout(() => {
          $splash.classList.add('hidden');
          state.syncing = false;
          typeof onDone === 'function' ? onDone() : playAt(0);
        }, 800);
      }, 600);

    } catch (err) {
      setStatus('Error de sincronización');
      showError('⚠ ' + err.message);
      setOffline(true);
      state.syncing = false;
      if (state.playlist.length > 0) {
        setTimeout(() => {
          $splash.style.opacity = '0';
          setTimeout(() => $splash.classList.add('hidden'), 800);
        }, 3500);
      }
    }
  }

  // ── PANEL DE AJUSTES ──────────────────────────────────────────────
  function openSettings() {
    const cfg = state.config || {};
    $fUrl.value   = cfg.playlistUrl || '';
    $fColor.value = cfg.backgroundColor || '#000000';
    $fImage.value = cfg.rawBackgroundImage || '';

    // Sincronizar el color picker con el valor actual
    const hex = toHex(cfg.backgroundColor || '#000000');
    if (hex) $cpicker.value = hex;

    $confPathDisp.textContent = cfg.confPath ? `Archivo: ${cfg.confPath}` : '';
    $saveMsg.textContent = '';
    $saveMsg.className   = '';
    $settingsOvl.classList.add('open');
  }

  function closeSettings() {
    $settingsOvl.classList.remove('open');
  }

  async function saveSettings() {
    const newValues = {
      playlistUrl:     $fUrl.value.trim(),
      backgroundColor: $fColor.value.trim() || '#000000',
      backgroundImage: $fImage.value.trim(),
    };

    $saveMsg.textContent = 'Guardando…';
    $saveMsg.className   = '';

    const result = await window.piKiosko.saveConfig(newValues);

    if (result.ok) {
      $saveMsg.textContent = `✓ Guardado en ${result.confPath}`;
      $saveMsg.className   = 'ok';

      // Recargar configuración y aplicarla al instante
      const cfg = await window.piKiosko.getConfig();
      applyConfig(cfg);

      setTimeout(closeSettings, 1800);
    } else {
      $saveMsg.textContent = '⚠ Error: ' + result.error;
      $saveMsg.className   = 'err';
    }
  }

  // Sincronizar texto → color picker al escribir un color válido
  $fColor.addEventListener('input', () => {
    const hex = toHex($fColor.value);
    if (hex) $cpicker.value = hex;
  });

  // Convertir color CSS a #RRGGBB para el color picker (solo para colores simples)
  function toHex(value) {
    const v = value.trim();
    if (/^#[0-9a-f]{6}$/i.test(v)) return v;
    if (/^#[0-9a-f]{3}$/i.test(v)) {
      const [, r, g, b] = v.match(/^#(.)(.)(.)$/);
      return `#${r}${r}${g}${g}${b}${b}`;
    }
    return null;
  }

  // Cerrar con Escape
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      if ($settingsOvl.classList.contains('open')) { closeSettings(); return; }
      if (e.ctrlKey) window.close();
    }
    if (e.key === 'F5')        { closeSettings(); startSync(); }
    if (!$settingsOvl.classList.contains('open')) {
      if (e.key === 'ArrowRight') onVideoEnded();
      if (e.key === 'ArrowLeft')  playAt(Math.max(0, state.currentIdx - 1));
    }
  });

  // ── IPC LISTENERS ─────────────────────────────────────────────────
  window.piKiosko.onSyncStatus((d) => {
    if (d.status === 'fetching-json') {
      setStatus('<span class="dots">Obteniendo lista de reproducción</span>');
      hideDlProgress();
    } else if (d.status === 'downloading') {
      setStatus('Descargando video…');
      showDlProgress(d.filename, 0);
    } else if (d.status === 'error') {
      setStatus(`Error: ${d.filename}`);
    }
  });

  window.piKiosko.onDownloadProgress((d) => {
    showDlProgress(d.url.split('/').pop(), d.percent);
  });

  window.piKiosko.onVideoDeleted((f) => {
    console.log('[PLAYER] Eliminado del disco:', f);
  });

  // ── ARRANQUE ───────────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', async () => {
    const cfg = await window.piKiosko.getConfig();
    applyConfig(cfg);
    setTimeout(() => startSync(), 400);
  });
  </script>
</body>
</html>
